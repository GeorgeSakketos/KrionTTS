name: Build and Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without prefix (example: 0.1)"
        required: true
        default: "0.1"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare release metadata
        id: prepare
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"
          APK_NAME="KrionTTS-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "app/build/outputs/apk/release/${APK_NAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.tag }}
          name: Release ${{ steps.prepare.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/${{ steps.prepare.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
