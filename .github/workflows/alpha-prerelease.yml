name: Build and Publish Alpha Pre-Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alpha-prerelease-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare tag and APK name
        run: |
          TAG="alpha-$(date -u +'%Y-%m-%d-%H%M%S')-${GITHUB_SHA::7}"
          APK_NAME="KrionTTS-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk "app/build/outputs/apk/release/${APK_NAME}"

          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Alpha Release ${{ env.TAG }}
          prerelease: true
          generate_release_notes: true
          body: |
            Automated alpha pre-release from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.
          files: |
            app/build/outputs/apk/release/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
